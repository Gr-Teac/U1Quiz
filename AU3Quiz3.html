<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WJEC Physics Unit 3 Exam Prep</title>
<style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #f8f9fa;
            --dark: #2c3e50;
            --border: #dee2e6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--light);
            color: var(--dark);
        }

        /* Responsive Sidebar */
        #sidebar {
            width: 280px;
            background: var(--primary);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 5px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            transition: 0.2s;
        }

        .nav-btn.active { border: 2px solid var(--secondary); background: rgba(52, 152, 219, 0.3); }
        .nav-btn.correct { background: var(--success) !important; border-color: var(--success); }
        .nav-btn.incorrect { background: var(--danger) !important; border-color: var(--danger); }

        /* Main Area */
        #main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .quiz-container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .question-meta {
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 10px;
            display: block;
        }

        .question-text {
            font-size: 1.25rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: white;
            text-align: left;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not([disabled]) { border-color: var(--secondary); background-color: #f0f7ff; }
        .option-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .option-btn.incorrect { background: var(--danger); color: white; border-color: var(--danger); }

        .feedback-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            line-height: 1.6;
            border-left: 5px solid;
        }

        .summary-item {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 6px solid;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .action-area {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button.main-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            background: var(--secondary);
            color: white;
            transition: 0.2s;
        }

        button.main-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        #restart-btn { background: #95a5a6; margin-top: auto; }
        #summary-btn { background: var(--primary); border: 1px solid rgba(255,255,255,0.3); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; box-sizing: border-box; }
            #main-content { padding: 15px; }
            .nav-grid { grid-template-columns: repeat(10, 1fr); }
        }
    

/* auto-fit nav grid */
.nav-grid{grid-template-columns:repeat(auto-fit,minmax(45px,1fr));}
@media(max-width:1024px){.nav-grid{grid-template-columns:repeat(auto-fit,minmax(35px,1fr));}}


/* --- Mobile Hamburger Menu Restore --- */
#sidebarToggle { display:none; position:sticky; top:0; width:100%; padding:12px; background:var(--primary); color:white; border:none; font-weight:700; cursor:pointer; z-index:60; }
#sidebarToggle .bars { width:22px; height:2px; background:#fff; box-shadow:0 6px 0 #fff, 0 -6px 0 #fff; display:inline-block; margin-right:10px; }
#overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:50; }
@media(max-width:1024px){
 body { flex-direction:column; }
 #sidebar { position:fixed; left:0; top:0; height:100dvh; width:min(85vw,300px); transform:translateX(-100%); transition:transform .25s ease; z-index:70; }
 #sidebar.open { transform:translateX(0); }
 #sidebarToggle { display:flex; align-items:center; }
}
</style>
</head>
<body><button aria-expanded="false" id="sidebarToggle"><span class="bars"></span> Menu</button>
<div id="sidebar">
<button id="sidebarClose" style="background:none;border:none;color:white;font-size:1.8rem;cursor:pointer;align-self:flex-end;margin-bottom:10px;">✕</button><h2 style="margin: 0 0 20px 0; font-size: 1.2rem;">Unit 3 Navigation</h2>
<div class="nav-grid" id="nav-grid"></div>
<button class="main-btn" id="summary-btn" style="margin-bottom:10px">Show Summary</button>
<button class="main-btn" id="restart-btn">Restart Quiz</button>
</div>
<div id="main-content">
<div class="quiz-container" id="quiz-view">
<span class="question-meta" id="q-num">Question 1 of 20</span>
<div class="question-text" id="q-text"></div>
<div class="options-list" id="options-container"></div>
<div class="feedback-box" id="feedback"></div>
<div class="action-area">
<button class="main-btn" id="prev-btn">Previous</button>
<button class="main-btn" id="next-btn">Next</button>
</div>
</div>
<div class="quiz-container" id="summary-view" style="display:none;">
<h2 style="margin-top:0">Review Performance</h2>
<div id="summary-list"></div>
<button class="main-btn" id="back-to-quiz">Return to Questions</button>
</div>
</div>
<script>
    const questionBank = [
        { q: "State the definition of the radian.", options: ["The angle subtended at the centre of a circle where the arc length equals the radius.", "The angle equivalent to 360 degrees divided by Pi.", "The angle subtended by a full circle circumference.", "The ratio of the diameter to the radius of a circle."], correct: 0, why: "As per the Unit 3 specification, a radian is the angle subtended at the centre of a circle by an arc of length equal to the radius." },
        { q: "Determine the direction of the centripetal acceleration for an object in uniform circular motion.", options: ["Tangent to the circular path.", "Directly away from the centre of the circle.", "Towards the centre of the circular motion.", "Downwards due to the effect of gravity."], correct: 2, why: "Acceleration in circular motion is always directed towards the centre of the motion because the velocity vector is constantly changing direction toward the centre." },
        { q: "In the first law of thermodynamics, given by ΔU = Q - W, what does the symbol 'W' represent?", options: ["Work done on the gas.", "Work done by the gas.", "The total internal energy of the system.", "The change in kinetic energy of the molecules."], correct: 1, why: "W represents work done BY the system (the gas)." },
        { q: "Identify the state of a system when it is at its 'absolute zero' temperature.", options: ["The temperature where all molecular motion ceases completely.", "The temperature where the system has its minimum possible internal energy.", "Exactly -273.00 degrees Celsius with zero pressure.", "The point where the potential energy of molecules is zero."], correct: 1, why: "WJEC defines absolute zero as the temperature at which a system has minimum internal energy." },
        { q: "State the primary condition required for an oscillation to be described as Simple Harmonic Motion (SHM).", options: ["The period must be proportional to the amplitude.", "Acceleration is proportional to displacement and directed toward the fixed point.", "Velocity must be constant throughout the cycle.", "The system must be undamped and in a vacuum."], correct: 1, why: "SHM is defined by a = -ω²x, where acceleration is proportional to displacement and in the opposite direction." },
        { q: "Explain the effect of increased damping on a system's resonance curve.", options: ["The peak becomes sharper and shifts to a higher frequency.", "The peak amplitude increases and the curve narrows.", "The curve broadens and the maximum amplitude decreases.", "The natural frequency of the system increases."], correct: 2, why: "Increased damping dissipates more energy, which broadens the resonance peak and reduces its height." },
        { q: "Identify an assumption of the kinetic theory of ideal gases regarding molecular collisions.", options: ["Collisions are inelastic to conserve internal energy.", "Collisions between molecules and walls are perfectly elastic.", "Molecules attract each other strongly during collisions.", "The duration of a collision is long compared to the time between them."], correct: 1, why: "Ideal gas laws assume collisions are perfectly elastic (no loss of kinetic energy) and of negligible duration." },
        { q: "Calculate the angular velocity (ω) of a satellite that has a period of rotation of 6300 s.", options: ["0.0016 rad/s", "9.97 x 10^-4 rad/s", "1.57 rad/s", "0.105 rad/s"], correct: 1, why: "Using ω = 2π / T. ω = 2π / 6300 ≈ 9.97 x 10⁻⁴ rad/s." },
        { q: "Define the 'Activity' of a radioactive source.", options: ["The time taken for half the nuclei to decay.", "The total energy released by the source per second.", "The number of disintegrations (decays) per unit time.", "The ratio of protons to neutrons in the nucleus."], correct: 2, why: "Activity is the rate of decay, measured in Becquerels (Bq), where 1 Bq = 1 decay per second." },
        { q: "State why alpha radiation is highly dangerous if it enters the human body.", options: ["It is the most penetrating form of radiation.", "It is highly ionising and can damage DNA or cells.", "It travels at the speed of light.", "It has a neutral charge and cannot be stopped by cells."], correct: 1, why: "Alpha particles have a high ionising power due to their +2 charge. While they have low penetration, they cause significant biological damage if inhaled or swallowed." },
        { q: "Which nucleon has a binding energy per nucleon of zero?", options: ["Helium-4", "Iron-56", "Hydrogen-1 (a single proton)", "Uranium-235"], correct: 2, why: "Hydrogen-1 consists of a single proton; since there are no nucleons to bind together, its binding energy is zero." },
        { q: "Describe the process of nuclear fusion.", options: ["A heavy nucleus splitting into two lighter nuclei.", "The emission of a high-energy electron from the nucleus.", "Two light nuclei joining together to form a heavier, more stable nucleus.", "The capture of an electron by a proton in the nucleus."], correct: 2, why: "Fusion is the joining of light nuclei. It releases energy because the binding energy per nucleon of the product is higher than that of the reactants." },
        { q: "State the relationship between pressure (p) and absolute temperature (T) for a fixed mass of gas at constant volume.", options: ["p is proportional to T", "p is inversely proportional to T", "p is proportional to T squared", "Pressure is independent of temperature"], correct: 0, why: "According to the Pressure Law (derived from pV=nRT), pressure is directly proportional to absolute temperature when volume is constant." },
        { q: "Identify the unit of the spring constant (k).", options: ["N m", "N m^-1", "J m", "kg m s^-1"], correct: 1, why: "From Hooke's Law (F=kx), k = F/x, which results in Newtons per metre (N m⁻¹)." },
        { q: "In the context of radioactive decay, what is meant by 'half-life'?", options: ["Half the time it takes for all nuclei to decay.", "The time taken for the number of radioactive nuclei to halve.", "The time taken for the mass of the sample to reach 0.5kg.", "The time for the decay constant to double."], correct: 1, why: "Half-life is the time taken for the activity, or the number of remaining radioactive nuclei, to decrease to half of its initial value." },
        { q: "Identify which particles are effectively stopped by a few millimetres of aluminium.", options: ["Alpha particles only", "Beta particles", "Gamma rays", "Neutrons"], correct: 1, why: "Alpha is stopped by paper; Beta is stopped by a few mm of aluminium; Gamma requires thick lead or concrete." },
        { q: "State what happens to the internal energy of an ideal gas during an isothermal expansion.", options: ["It increases because the volume is larger.", "It decreases because work is done by the gas.", "It remains constant because the temperature is constant.", "It increases due to heat flow into the system."], correct: 2, why: "For an ideal gas, internal energy is purely kinetic and proportional to temperature. In an isothermal process, ΔT=0, so ΔU=0." },
        { q: "Calculate the energy released (in MeV) from a mass defect of 0.0287 u.", options: ["26.7 MeV", "931 MeV", "0.0287 MeV", "186 MeV"], correct: 0, why: "Using the conversion 1 u = 931 MeV: 0.0287 * 931 ≈ 26.7 MeV." },
        { q: "Determine the fraction of a radioactive sample remaining after 3 half-lives.", options: ["1/3", "1/6", "1/8", "1/9"], correct: 2, why: "Remaining fraction = (1/2)^n. For n=3, (1/2)³ = 1/8." },
        { q: "Identify the force that provides centripetal acceleration for a car on a flat, curved road.", options: ["The car's weight.", "Normal contact force.", "Friction between the tyres and the road.", "The engine's thrust."], correct: 2, why: "On a flat road, friction is the only horizontal force acting toward the centre of the curve." },
        { q: "Determine the temperature in Kelvin equivalent to 20 degrees Celsius.", options: ["20 K", "-253 K", "293 K", "273 K"], correct: 2, why: "T(K) = T(°C) + 273.15. 20 + 273 = 293 K." },
        { q: "Describe 'Critical Damping' in a mechanical system.", options: ["Damping that allows the system to oscillate indefinitely.", "Damping that returns the system to equilibrium as quickly as possible without oscillating.", "Damping that is so strong the system never reaches equilibrium.", "Damping that matches the driving frequency."], correct: 1, why: "Critical damping is the specific level of resistance that prevents overshoot while minimizing return time to equilibrium." },
        { q: "State the First Law of Thermodynamics for a solid where volume change is negligible.", options: ["Q = W", "ΔU = Q", "ΔU = -W", "Q = ΔU + W"], correct: 1, why: "In solids/liquids, W is usually negligible (ΔV ≈ 0), so the First Law ΔU = Q - W simplifies to ΔU = Q." },
        { q: "Explain why 'Show that' questions in physics exams require more significant figures in the final step.", options: ["To be more precise than the data given.", "To provide proof that the answer was calculated and not just copied from the question.", "Because standard units require 4 decimal places.", "To account for uncertainty in the equipment."], correct: 1, why: "Examiners look for extra significant figures in proof-style questions to ensure the candidate actually derived the value." },
        { q: "Identify the nucleon number (A) and proton number (Z) of an alpha particle.", options: ["A=2, Z=2", "A=4, Z=2", "A=4, Z=4", "A=2, Z=4"], correct: 1, why: "An alpha particle is a helium nucleus: 2 protons and 2 neutrons, so A=4 and Z=2." },
        { q: "Calculate the work done (W) by a gas expanding by 0.5 m³ at a constant pressure of 200 kPa.", options: ["100 J", "100,000 J", "400 J", "0.0025 J"], correct: 1, why: "W = PΔV. W = 200,000 Pa * 0.5 m³ = 100,000 J." },
        { q: "Identify the peak of the binding energy per nucleon curve.", options: ["Uranium-238", "Iron-56", "Helium-4", "Hydrogen-2"], correct: 1, why: "The maximum stability (highest BE per nucleon) occurs near Iron (Fe-56) and Nickel." },
        { q: "Determine the angular velocity of the Earth's rotation in rad/s.", options: ["7.27 x 10^-5 rad/s", "1.16 x 10^-3 rad/s", "0.26 rad/s", "6.28 rad/s"], correct: 0, why: "ω = 2π / T. T = 24 * 3600s = 86400s. ω = 2π/86400 ≈ 7.27 x 10⁻⁵ rad/s." },
        { q: "State the change in the nucleus during beta-minus (β-) decay.", options: ["A proton changes into a neutron.", "A neutron changes into a proton.", "The nucleus loses two protons and two neutrons.", "The nucleus emits a high-energy photon only."], correct: 1, why: "In β- decay, a neutron becomes a proton, emitting an electron and an antineutrino. This increases the atomic number Z by 1." },
        { q: "Define 'Specific Heat Capacity'.", options: ["Energy required to change the state of 1kg of a substance.", "Energy required to raise the temperature of 1kg of a substance by 1 Kelvin.", "The total internal energy of 1kg of a substance.", "The rate of heat transfer through a material."], correct: 1, why: "Specific heat capacity is the energy needed to change the temperature of unit mass by unit temperature rise." },
        { q: "Identify the main force responsible for radioactive alpha decay tunnelling.", options: ["Gravitational force", "Electrostatic repulsion", "Strong nuclear force", "Weak nuclear force"], correct: 2, why: "Quantum tunnelling allows alpha particles to overcome the strong nuclear force barrier that normally holds them inside the nucleus." },
        { q: "State the meaning of 'Monatomic' gas.", options: ["A gas where all molecules have the same mass.", "A gas consisting of single atoms rather than molecules.", "A gas that exists only at absolute zero.", "A gas with only one electron per atom."], correct: 1, why: "Monatomic gases, like Helium or Neon, consist of single atoms." },
        { q: "Identify the constant represented by 'k' in the equation pV = NkT.", options: ["Molar gas constant", "Boltzmann constant", "Spring constant", "Decay constant"], correct: 1, why: "In the molecular version of the ideal gas law, k is the Boltzmann constant (R / Na)." },
        { q: "Explain why no work is done during a constant volume (isochoric) process.", options: ["The pressure is zero.", "The temperature is zero.", "Displacement (ΔV) is zero, and Work = PΔV.", "The gas molecules stop moving."], correct: 2, why: "Work requires a change in volume. If ΔV = 0, PΔV = 0." },
        { q: "Determine the unit for angular acceleration.", options: ["rad s^-1", "rad s^-2", "m s^-2", "Degrees"], correct: 1, why: "Angular velocity is rad/s, so angular acceleration (rate of change of ω) is rad/s²." },
        { q: "Identify the condition for resonance in a forced oscillation.", options: ["Driving frequency is double the natural frequency.", "Driving frequency equals the natural frequency.", "The system is critically damped.", "Amplitude is zero."], correct: 1, why: "Resonance occurs when the periodic driving force matches the natural frequency of the oscillator." },
        { q: "Calculate the root-mean-square (rms) speed of molecules with speeds of 3, 4, and 5 m/s.", options: ["4.00 m/s", "4.08 m/s", "4.15 m/s", "12.0 m/s"], correct: 1, why: "Square speeds (9, 16, 25), Mean (50/3 = 16.67), Root (√16.67 ≈ 4.08)." },
        { q: "State what is represented by ΔU in thermodynamics.", options: ["Total Heat Energy", "Work done", "Change in internal energy", "Kinetic energy only"], correct: 2, why: "ΔU represents the change or increase in the total internal energy (Sum of PE and KE) of a system." },
        { q: "Identify the decay constant (λ) relationship to half-life (T½).", options: ["λ = T½ / 0.693", "λ = 0.693 / T½", "λ = T½", "λ = 1 / T½"], correct: 1, why: "The relationship is λ = ln(2) / T½, where ln(2) ≈ 0.693." },
        { q: "What provides the centripetal force for a satellite orbiting Earth?", options: ["Air resistance", "Engine thrust", "Gravitational pull of the Earth", "Magnetic fields"], correct: 2, why: "Gravity acts as the resultant force directed toward the Earth's centre, maintaining the orbit." },
        { q: "State the value of the molar gas constant R.", options: ["1.38 x 10^-23 J/K", "6.67 x 10^-11 N m²/kg²", "8.31 J mol^-1 K^-1", "9.81 m/s²"], correct: 2, why: "8.31 J mol⁻¹ K⁻¹ is the universal molar gas constant." },
        { q: "Identify the nucleon number change during alpha decay.", options: ["Decreases by 2", "Decreases by 4", "Increases by 2", "Remains constant"], correct: 1, why: "An alpha particle (4/2 He) removes 4 nucleons from the parent nucleus." },
        { q: "Determine the frequency of an oscillation with a period of 0.5 seconds.", options: ["0.5 Hz", "1.0 Hz", "2.0 Hz", "5.0 Hz"], correct: 2, why: "f = 1 / T. f = 1 / 0.5 = 2.0 Hz." },
        { q: "State the assumption of Kinetic Theory regarding the volume of molecules.", options: ["Molecules are large spheres.", "Molecular volume is negligible compared to the volume of the gas.", "Molecules occupy 10% of the container.", "The volume of a molecule depends on its speed."], correct: 1, why: "Ideal gas laws assume molecules are point masses with negligible volume compared to the container." },
        { q: "Identify the purpose of a 'fiducial mark' in a pendulum experiment.", options: ["To measure the mass of the bob.", "To provide a consistent reference point for timing oscillations.", "To calculate the angle of release.", "To stop the pendulum swinging."], correct: 1, why: "A mark at the equilibrium position allows for more accurate and consistent timing of full oscillations." },
        { q: "Define 'Molar Mass'.", options: ["The mass of one molecule.", "The mass of one mole of a substance.", "The number of molecules in one gram.", "The density of a gas at STP."], correct: 1, why: "Molar mass is the mass of Avogadro's number (1 mole) of particles." },
        { q: "Identify the result of nuclear fission in terms of binding energy.", options: ["Binding energy per nucleon decreases.", "Binding energy per nucleon increases.", "Total mass remains the same.", "The product is less stable than the parent."], correct: 1, why: "Fission produces lighter, more stable nuclei with a higher binding energy per nucleon, releasing energy in the process." },
        { q: "State the unit for Activity in the SI system.", options: ["Curie", "Becquerel", "Gray", "Sievert"], correct: 1, why: "The Becquerel (Bq) is the SI unit for activity, equal to one decay per second." },
        { q: "Determine the angular velocity (ω) of a second-hand on a clock.", options: ["1.0 rad/s", "0.105 rad/s", "6.28 rad/s", "0.017 rad/s"], correct: 1, why: "T = 60s. ω = 2π / 60 ≈ 0.105 rad/s." },
        { q: "What happens to the internal energy of a liquid during boiling?", options: ["Kinetic energy increases.", "Potential energy increases while kinetic remains constant.", "Both decrease.", "Internal energy is zero during phase change."], correct: 1, why: "During a phase change, temperature (KE) is constant; the energy supplied increases the potential energy (separation) of the molecules." }
    ];

    let currentQuestions = [];
    let userAnswers = new Array(20).fill(null);
    let currentIdx = 0;

    function init() {
        const shuffled = [...questionBank].sort(() => 0.5 - Math.random());
        currentQuestions = shuffled.slice(0, 20);
        userAnswers = new Array(20).fill(null);
        currentIdx = 0;
        
        renderNav();
        updateUI();
        toggleView('quiz');
    }

    function renderNav() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = '';
        currentQuestions.forEach((_, i) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = i + 1;
            btn.id = `nav-${i}`;
            btn.onclick = () => jumpTo(i);
            grid.appendChild(btn);
        });
    }

    function updateUI() {
        const q = currentQuestions[currentIdx];
        document.getElementById('q-num').innerText = `Question ${currentIdx + 1} of 20`;
        document.getElementById('q-text').innerHTML = q.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const feedback = document.getElementById('feedback');
        feedback.style.display = 'none';

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            
            if (userAnswers[currentIdx] !== null) {
                btn.disabled = true;
                if (i === q.correct) btn.classList.add('correct');
                if (i === userAnswers[currentIdx] && i !== q.correct) btn.classList.add('incorrect');
                
                feedback.style.display = 'block';
                feedback.style.backgroundColor = userAnswers[currentIdx] === q.correct ? '#d4edda' : '#f8d7da';
                feedback.style.borderColor = userAnswers[currentIdx] === q.correct ? '#c3e6cb' : '#f5c6cb';
                feedback.innerHTML = `<strong>Feedback:</strong> ${q.why}`;
            } else {
                btn.onclick = () => select(i);
            }
            container.appendChild(btn);
        });

        // Update nav visual
        document.querySelectorAll('.nav-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i === currentIdx);
            if (userAnswers[i] !== null) {
                btn.classList.add(userAnswers[i] === currentQuestions[i].correct ? 'correct' : 'incorrect');
            }
        });

        document.getElementById('prev-btn').disabled = currentIdx === 0;
        document.getElementById('next-btn').disabled = currentIdx === 19;
    }

    function select(idx) {
        userAnswers[currentIdx] = idx;
        updateUI();
    }

    function jumpTo(idx) {
        currentIdx = idx;
        updateUI();
    }

    function toggleView(view) {
        document.getElementById('quiz-view').style.display = view === 'quiz' ? 'block' : 'none';
        document.getElementById('summary-view').style.display = view === 'summary' ? 'block' : 'none';
        if (view === 'summary') renderSummary();
    }

    function renderSummary() {
        const list = document.getElementById('summary-list');
        list.innerHTML = '';
        let score = 0;
        let count = 0;

        currentQuestions.forEach((q, i) => {
            if (userAnswers[i] !== null) {
                count++;
                const correct = userAnswers[i] === q.correct;
                if (correct) score++;
                
                const item = document.createElement('div');
                item.className = 'summary-item';
                item.style.borderColor = correct ? 'var(--success)' : 'var(--danger)';
                item.innerHTML = `
                    <strong>Question ${i+1}:</strong> ${q.q}<br>
                    <span style="color:${correct ? 'green' : 'red'}">Your choice: ${q.options[userAnswers[i]]}</span><br>
                    <small>Correct: ${q.options[q.correct]}</small>
                    <p style="margin-top:10px; font-style:italic; font-size:0.9em;">${q.why}</p>
                `;
                list.appendChild(item);
            }
        });
        
        const header = document.createElement('h3');
        header.innerText = `Session Score: ${score} / ${count} answered.`;
        list.prepend(header);
    }

    document.getElementById('prev-btn').onclick = () => { if(currentIdx > 0) jumpTo(currentIdx - 1); };
    document.getElementById('next-btn').onclick = () => { if(currentIdx < 19) jumpTo(currentIdx + 1); };
    document.getElementById('restart-btn').onclick = init;
    document.getElementById('summary-btn').onclick = () => toggleView('summary');
    document.getElementById('back-to-quiz').onclick = () => toggleView('quiz');

    init();


// --- Hamburger Menu Logic ---
(function(){
 const sidebar = document.getElementById('sidebar');
 const toggle = document.getElementById('sidebarToggle');
 const overlay = document.getElementById('overlay');

 function open(){ sidebar.classList.add('open'); overlay.style.display='block'; toggle.setAttribute('aria-expanded','true'); }
 function close(){ sidebar.classList.remove('open'); overlay.style.display='none'; toggle.setAttribute('aria-expanded','false'); }

 toggle?.addEventListener('click', ()=> sidebar.classList.contains('open') ? close() : open());
 overlay?.addEventListener('click', close);
 document.addEventListener('keydown', e => { if(e.key==='Escape') close(); });
 document.addEventListener('click', e => { if(e.target.classList.contains('nav-btn')) close(); });
})();

// Close button inside sidebar
(function(){

 const overlay=document.getElementById('overlay');
 const toggle=document.getElementById('sidebarToggle');
 function close(){sidebar.classList.remove('open');overlay.style.display='none';toggle.setAttribute('aria-expanded','false');}
 closeBtn?.addEventListener('click',close);
})();
</script>

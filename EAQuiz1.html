<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Level Electronics Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<div id="app" class="flex flex-col md:flex-row h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-full md:w-64 lg:w-80 bg-white border-b md:border-b-0 md:border-r border-slate-200 flex flex-col h-[30%] md:h-full">
        <div class="p-5 border-b border-slate-100 bg-white">
            <h1 class="text-xl font-black text-blue-600 leading-tight">A-Level Electronics</h1>
            <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest font-bold">Component & System Mastery</p>
        </div>
        <nav class="flex-1 overflow-y-auto p-4 custom-scrollbar bg-slate-50/30" id="question-list">
            <!-- Questions injected here -->
        </nav>
        <div class="p-5 border-t border-slate-100 bg-white shadow-sm">
            <div class="flex justify-between items-center text-sm font-bold text-slate-600 mb-2">
                <span>Session Progress</span>
                <span id="progress-text">0/20</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-2">
                <div id="progress-bar" class="bg-blue-500 h-2 rounded-full transition-all duration-700 ease-out" style="width: 0%"></div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-4 md:p-10 lg:p-16">
        <div class="max-w-3xl mx-auto">
            <!-- Question Card -->
            <div id="quiz-container" class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-10 transition-all">
                <div id="question-header" class="mb-8">
                    <div class="flex justify-between items-center mb-4">
                        <span id="question-tag" class="px-3 py-1 bg-blue-50 text-blue-600 text-[10px] font-black rounded-lg uppercase tracking-widest border border-blue-100">Question 1 / 20</span>
                        <button onclick="startNewSession()" class="flex items-center gap-2 text-[10px] font-bold text-slate-400 hover:text-blue-600 uppercase tracking-widest transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                            Refresh Bank
                        </button>
                    </div>
                    <h2 id="question-text" class="text-xl md:text-2xl font-bold text-slate-800 leading-relaxed"></h2>
                </div>

                <div id="options-container" class="grid gap-3">
                    <!-- Options injected here -->
                </div>

                <!-- Feedback Section -->
                <div id="feedback-container" class="mt-8 hidden animate-in fade-in slide-in-from-bottom-4 duration-300">
                    <div id="feedback-box" class="p-5 rounded-2xl border-2 flex gap-4 items-start">
                        <div id="feedback-icon" class="mt-1 flex-shrink-0 text-xl"></div>
                        <div class="flex-1">
                            <p id="feedback-status" class="font-black text-xs uppercase tracking-widest mb-1"></p>
                            <p id="feedback-text" class="text-slate-600 text-sm leading-relaxed italic"></p>
                        </div>
                    </div>
                    <button id="next-btn" class="mt-6 w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-blue-700 transition-all shadow-xl shadow-blue-100 active:scale-[0.98]">Continue</button>
                </div>
            </div>

            <!-- Summary View -->
            <div id="summary-container" class="hidden text-center py-12 px-4">
                <div class="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h2 class="text-3xl font-black text-slate-800 mb-2">Systems Online</h2>
                <p class="text-slate-500 font-medium mb-8">Session diagnostics complete.</p>
                
                <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto mb-10">
                    <div class="bg-white p-5 rounded-2xl border border-slate-100">
                        <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">Correct</p>
                        <p id="final-score" class="text-2xl font-black text-blue-600">0/20</p>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-slate-100">
                        <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest mb-1">Efficiency</p>
                        <p id="final-percent" class="text-2xl font-black text-blue-600">0%</p>
                    </div>
                </div>

                <button onclick="startNewSession()" class="inline-flex items-center gap-3 px-8 py-4 bg-slate-900 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-blue-600 transition-all shadow-xl active:scale-95">
                    Re-Initialize
                </button>
            </div>
        </div>
    </main>
</div>

<script>
const masterQuestionBank = [
    { q: "Identify the result of the Boolean identity A⋅1.", a: "A", options: ["0", "1", "A", "A̅"], f: "According to the Boolean identity A⋅1=A, any variable ANDed with logic 1 remains unchanged." },
    { q: "Identify the result of the Boolean identity B⋅B̅.", a: "0", options: ["0", "1", "B", "B̅"], f: "The identity B⋅B̅=0 states that a variable ANDed with its complement is always logic 0." },
    { q: "Calculate the resolution of an 8-bit flash ADC with an input voltage range of 100 mV.", a: "0.39 mV", options: ["12.5 mV", "0.39 mV", "0.78 mV", "25 mV"], f: "Resolution is determined by the formula: input voltage range / 2^n. Here, 100 mV / 256 = 0.39 mV." },
    { q: "State the primary advantage of using Time-Division Multiplexing (TDM) in a communication system.", a: "Reduces the number of physical cables required", options: ["Increases the bandwidth of each channel", "Eliminates the need for a carrier frequency", "Reduces the number of physical cables required", "Prevents all forms of signal attenuation"], f: "TDM allows multiple signals to share a single medium by taking turns, which makes systems cheaper by requiring fewer cables." },
    { q: "Identify the ideal value for the input impedance of an operational amplifier.", a: "Infinite", options: ["Zero", "Infinite", "10 kΩ", "1 MΩ"], f: "An ideal op-amp has infinite input impedance, meaning it draws no current from the input sub-system." },
    { q: "Identify the ideal value for the output impedance of an operational amplifier.", a: "Zero", options: ["Zero", "Infinite", "50 Ω", "100 kΩ"], f: "An ideal op-amp has zero output impedance." },
    { q: "Calculate the voltage gain of a non-inverting amplifier where RF=390 kΩ and R1=10 kΩ.", a: "40", options: ["39", "40", "0.025", "400"], f: "The gain for a non-inverting amplifier is calculated as G = 1 + (RF/R1). Thus, 1 + (390/10) = 40." },
    { q: "Calculate the voltage gain of an inverting amplifier where RF=180 kΩ and RIN=12 kΩ.", a: "-15", options: ["15", "-15", "16", "-16"], f: "The gain for an inverting amplifier is G = -RF/RIN. Thus, -180/12 = -15." },
    { q: "State the relationship between the input impedance of an inverting amplifier and its components.", a: "It is approximately equal to the input resistor RIN", options: ["It is infinite", "It is zero", "It is approximately equal to the input resistor RIN", "It is equal to the feedback resistor RF"], f: "Because of the virtual earth at the inverting input, the input impedance of an inverting amplifier is approximately the value of RIN." },
    { q: "Identify the effect of 'clipping' in an amplifier circuit.", a: "The output voltage exceeds the saturation voltage", options: ["The gain increases unexpectedly", "The output voltage exceeds the saturation voltage", "The input impedance drops to zero", "The signal frequency is doubled"], f: "Clipping distortion occurs when the required output voltage is greater than the power supply can provide, causing the peaks to be 'clipped' at the saturation levels." },
    { q: "State the minimum sampling frequency required to successfully recreate a 15 kHz audio signal.", a: "30 kHz", options: ["7.5 kHz", "15 kHz", "30 kHz", "60 kHz"], f: "According to Nyquist's theorem, the sampling frequency must be at least twice the highest frequency in the signal." },
    { q: "Calculate the time constant (T) for an RC network with R=36 kΩ and C=120 μF.", a: "4.32 s", options: ["0.3 s", "4.32 s", "3.0 s", "43.2 ms"], f: "The time constant is calculated as T = RC. Thus, 36,000 × 120 × 10^-6 = 4.32 s." },
    { q: "Identify the percentage of the final voltage a capacitor reaches after one time constant (1RC) while charging.", a: "63%", options: ["37%", "50%", "63%", "95%"], f: "After one time constant, a charging capacitor reaches approximately 63% of its final value." },
    { q: "Calculate the time taken for a capacitor to discharge to half its initial voltage in an RC circuit.", a: "0.69RC", options: ["RC", "0.69RC", "5RC", "1.1RC"], f: "The 'half-life' or time to reach 50% during discharge is given by 0.69RC." },
    { q: "State the purpose of a dummy strain gauge in a bridge circuit.", a: "To compensate for temperature changes", options: ["To increase the voltage gain", "To compensate for temperature changes", "To provide a reference voltage", "To protect the op-amp from high current"], f: "A dummy strain gauge is used to ensure that changes in temperature affect both sides of the bridge equally, cancelling out errors." },
    { q: "Identify the code used on encoded discs to prevent false readings at segment boundaries.", a: "Gray code", options: ["Pure binary", "Gray code", "BCD", "Hexadecimal"], f: "Gray code is used because only one bit changes state at a time, preventing erroneous readings if sensors are slightly misaligned." },
    { q: "Calculate the bandwidth of an FM signal with a frequency deviation of 65 kHz and a maximum audio frequency of 4 kHz.", a: "138 kHz", options: ["69 kHz", "138 kHz", "130 kHz", "220 kHz"], f: "Bandwidth for FM is calculated as 2(Δfc + fi). Thus, 2(65 + 4) = 138 kHz." },
    { q: "Identify the function of a Schmitt trigger in a digital receiver.", a: "To regenerate a clean digital signal", options: ["To convert analogue to digital", "To amplify the carrier wave", "To regenerate a clean digital signal", "To multiplex multiple channels"], f: "Schmitt triggers are used to 'clean up' or regenerate digital pulses that have been affected by noise or attenuation." },
    { q: "State the condition required to switch on a thyristor in a DC circuit.", a: "Forward biased with sufficient gate current", options: ["Reverse biased with gate voltage", "Forward biased with no gate current", "Forward biased with sufficient gate current", "Negative gate voltage applied"], f: "A thyristor requires forward bias between anode and cathode and a pulse of current at the gate terminal to trigger conduction." },
    { q: "Identify the process used to turn off a thyristor in a DC circuit.", a: "Capacitor commutation", options: ["Increasing the gate current", "Capacitor commutation", "Removing the forward bias", "Applying a logic 0 to the gate"], f: "Capacitor commutation is used to momentarily reverse-bias the thyristor to turn it off in DC circuits." },
    { q: "Calculate the bandwidth of a voltage amplifier with a gain of 20 and a Gain-Bandwidth Product (GBP) of 3 MHz.", a: "150 kHz", options: ["60 kHz", "150 kHz", "300 kHz", "1.5 MHz"], f: "Bandwidth is estimated by GBP/Gain. Thus, 3 × 10^6 / 20 = 150,000 Hz." },
    { q: "Define 'transconductance' (gM) for a MOSFET.", a: "The gradient of the ID vs VGS graph", options: ["The ratio of output voltage to input voltage", "The internal resistance when fully on", "The gradient of the ID vs VGS graph", "The minimum gate voltage required to conduct"], f: "Transconductance (gM) is defined as the change in drain current divided by the change in gate-source voltage." },
    { q: "State the assumed gate threshold voltage (VGSth) for an enhancement mode MOSFET in A-level calculations.", a: "3 V", options: ["0.7 V", "1.5 V", "3 V", "5 V"], f: "In standard exam calculations, an enhancement mode MOSFET is assumed to begin conducting at a threshold of 3 V." },
    { q: "Calculate the power dissipated in a MOSFET with ID=5 A and rDSon=0.2 Ω.", a: "5 W", options: ["1 W", "5 W", "10 W", "25 W"], f: "Power is calculated using P = ID^2 × rDSon. Thus, 5^2 × 0.2 = 5 W." },
    { q: "State the function of a diac in a triac-based phase control circuit.", a: "To provide a sharp trigger pulse for the triac", options: ["To rectify the AC supply", "To provide a sharp trigger pulse for the triac", "To act as a smoothing capacitor", "To limit the maximum current to the load"], f: "A diac ensures the triac triggers rapidly once the breakover voltage is reached, improving rise time and reducing heat." },
    { q: "Calculate the ripple voltage for a power supply with a load current of 0.2 A, a frequency of 50 Hz, and a 1000 μF capacitor.", a: "4 V", options: ["1 V", "2 V", "4 V", "8 V"], f: "Ripple voltage is calculated using Vr = I/(fC). Thus, 0.2 / (50 × 1000 × 10^-6) = 4 V." },
    { q: "Identify the meaning of 'load regulation' in a power supply.", a: "The output voltage remains steady when output current changes", options: ["The output voltage remains steady when input voltage changes", "The output voltage remains steady when output current changes", "The power supply can handle short circuits", "The ripple voltage is eliminated"], f: "Load regulation is the ability of a power supply to maintain a constant output voltage despite changes in the current drawn by the load." },
    { q: "Calculate the time period of a 555 monostable with R=130 kΩ and C=68 μF.", a: "9.7 s", options: ["4.3 s", "8.8 s", "9.7 s", "11.2 s"], f: "The time period for a 555 monostable is T = 1.1RC. Thus, 1.1 × 130,000 × 68 × 10^-6 = 9.7 s." },
    { q: "Identify the component used to remove crossover distortion in a push-pull amplifier.", a: "Operational amplifier with negative feedback", options: ["Zener diode", "Large smoothing capacitor", "Operational amplifier with negative feedback", "Schmitt trigger"], f: "Negative feedback from an op-amp is used to compensate for the 0.7 V base-emitter drops, eliminating crossover distortion." },
    { q: "State the advantage of a synchronous counter over an asynchronous (ripple) counter.", a: "All stages are clocked at exactly the same time", options: ["It requires fewer flip-flops", "All stages are clocked at exactly the same time", "It can count to higher numbers", "It consumes less power"], f: "In a synchronous counter, every flip-flop receives the clock pulse simultaneously, preventing propagation delays from accumulating." },
    { q: "Calculate the break frequency (fb) for a filter with R=6.2 kΩ and C=9.4 nF.", a: "2.73 kHz", options: ["1.55 kHz", "2.73 kHz", "5.45 kHz", "10.2 kHz"], f: "The break frequency is 1/(2πRC). Thus, 1 / (2π × 6200 × 9.4 × 10^-9) = 2728 Hz." },
    { q: "Identify the type of filter that allows frequencies above the break frequency to pass with maximum gain.", a: "High-pass filter", options: ["Low-pass filter", "High-pass filter", "Band-pass filter", "Band-stop filter"], f: "A high-pass filter attenuates low frequencies and allows high frequencies to pass." },
    { q: "State the purpose of the TRISB register in a PIC microcontroller.", a: "To configure Port B pins as inputs or outputs", options: ["To store temporary data", "To clear the interrupt flag", "To configure Port B pins as inputs or outputs", "To set the clock frequency"], f: "The TRIS registers (Data Direction Registers) determine whether each pin on a port acts as an input or an output." },
    { q: "Calculate the number of wind directions sensed by a 5-ring Gray-encoded disc.", a: "32", options: ["5", "10", "25", "32"], f: "A disc with n rings has 2^n segments. Thus, 2^5 = 32." },
    { q: "Identify the result of the Boolean identity A+A̅.", a: "1", options: ["0", "1", "A", "A̅"], f: "The identity A+A̅=1 states that ORing a variable with its complement always results in logic 1." },
    { q: "State what 'attenuation' means in the context of a copper cable link.", a: "Signal amplitude decreases due to energy losses", options: ["The signal is distorted by external sources", "The signal frequency increases", "Signal amplitude decreases due to energy losses", "The signal is converted to digital"], f: "Attenuation is the reduction in signal strength (amplitude) as it travels, often caused by heat generation in the cable." },
    { q: "Identify the function of a PISO register in a PCM transmitter.", a: "To convert parallel data into a serial stream", options: ["To sample the analogue signal", "To convert parallel data into a serial stream", "To remove quantisation noise", "To provide timing pulses"], f: "Parallel-In-Serial-Out (PISO) registers take the multi-bit output of an ADC and send it bit-by-bit down the transmission link." },
    { q: "Calculate the overall gain in dB for a system with two 15 dB amplifiers and a cable loss of 32 dB.", a: "-2 dB", options: ["30 dB", "2 dB", "-2 dB", "62 dB"], f: "Total gain is the sum of individual gains and losses: 15 + 15 - 32 = -2 dB." },
    { q: "State the purpose of a 'guard band' in Frequency-Division Multiplexing (FDM).", a: "To prevent crosstalk between adjacent channels", options: ["To increase the data rate", "To prevent crosstalk between adjacent channels", "To act as a reference frequency", "To amplify the high frequency components"], f: "Guard bands are unused frequency gaps placed between channels to reduce interference." },
    { q: "Identify the 'stuck state' in a sequence generator.", a: "A state that never leads back into the main sequence", options: ["The initial power-up state", "The most frequent state in the sequence", "A state that never leads back into the main sequence", "A state that causes the clock to stop"], f: "A stuck state is an unused state that loops to itself or other unused states, preventing the system from ever entering the intended main sequence." },
    { q: "State the effect of increasing the sampling frequency in an ADC system.", a: "System complexity and data storage requirements increase", options: ["The resolution of each sample increases", "Quantisation noise is eliminated", "System complexity and data storage requirements increase", "The input voltage range is expanded"], f: "Higher sampling frequencies improve signal reproduction but require more processing power and memory." },
    { q: "Identify the component that converts light pulses back into electrical current in an optical receiver.", a: "Photodiode", options: ["Laser diode", "LED", "Photodiode", "LDR"], f: "A photodiode is used in reverse bias to detect light pulses and produce a corresponding electrical signal." },
    { q: "Calculate the power delivered by a laser pulse of 0.5 mJ lasting 500 ns.", a: "1 kW", options: ["1 W", "250 W", "1 kW", "2.5 kW"], f: "Power is Energy / time. Thus, (0.5 × 10^-3) / (500 × 10^-9) = 1000 W or 1 kW." },
    { q: "Identify the logic gate that performs the same function as a 2-input NAND gate with its output inverted.", a: "AND", options: ["OR", "NOR", "AND", "XOR"], f: "Inverting the output of a NAND gate produces the AND function." },
    { q: "State the condition for 'total internal reflection' in an optical fibre.", a: "The core refractive index is higher than the cladding", options: ["The cladding refractive index is higher than the core", "The core refractive index is higher than the cladding", "The angle of incidence is less than the critical angle", "The light frequency is above the break frequency"], f: "For TIR to occur, light must travel from a denser medium (higher refractive index core) and hit the interface at an angle greater than the critical angle." },
    { q: "Identify the term for the inducing of a signal in one wire from an adjacent wire.", a: "Crosstalk", options: ["Attenuation", "Crosstalk", "Dispersion", "Aliasing"], f: "Crosstalk is interference caused by electromagnetic coupling between nearby transmission lines." },
    { q: "Calculate the Signal-to-Noise Ratio (SNR) in dB for a 5 mW signal and 0.001 mW noise.", a: "37 dB", options: ["5 dB", "20 dB", "37 dB", "50 dB"], f: "SNR (dB) is 10 log10(PS / PN). Thus, 10 log10(5 / 0.001) = 37 dB." },
    { q: "State the function of the 'stack' during a microcontroller interrupt.", a: "To store the address of the next instruction", options: ["To store the results of calculations", "To store the address of the next instruction", "To clear all port registers", "To determine the priority of the interrupt"], f: "The stack saves the program counter address so the processor can return to exactly where it left off after the interrupt is handled." },
    { q: "Identify the decimal equivalent of the hexadecimal number 'B'.", a: "11", options: ["10", "11", "12", "13"], f: "In hexadecimal, A=10, B=11, C=12, etc." },
    { q: "State the primary difference between active and passive filters.", a: "Active filters can provide a voltage gain greater than 1", options: ["Active filters do not use resistors", "Passive filters are more secure", "Active filters can provide a voltage gain greater than 1", "Passive filters require a power supply"], f: "Active filters use op-amps to provide amplification, whereas passive filters have a maximum voltage gain of 1." },
    { q: "Identify the Boolean identity A+A.", a: "A", options: ["0", "1", "A", "2A"], f: "The identity A+A=A states that a variable ORed with itself remains unchanged." },
    { q: "State the ideal value for the Common Mode Rejection Ratio (CMRR) of an op-amp.", a: "Infinite", options: ["Zero", "100", "1000", "Infinite"], f: "An ideal operational amplifier has an infinite CMRR, meaning it rejects all signals common to both inputs." },
    { q: "Calculate the slew-rate limited time for an output to change by 10 V if the slew rate is 4 V μs^-1.", a: "2.5 μs", options: ["0.4 μs", "2.5 μs", "4 μs", "40 μs"], f: "Time is calculated as ΔV / Slew Rate. Thus, 10 / 4 = 2.5 μs." },
    { q: "Identify the purpose of a decoupling capacitor between two amplifier stages.", a: "To block DC signals from transferring", options: ["To increase the AC gain", "To block DC signals from transferring", "To provide a local power reservoir", "To filter out high frequency noise"], f: "Decoupling capacitors are used to prevent DC bias voltages from one stage affecting the next stage while allowing the AC signal through." },
    { q: "Identify the number of comparators required for a 4-bit flash ADC.", a: "15", options: ["4", "8", "15", "16"], f: "A flash ADC requires 2^n - 1 comparators. For 4 bits, 16 - 1 = 15." },
    { q: "Identify the name for the type of modulation where the signal is conveyed by the displacement of pulses.", a: "PPM", options: ["PWM", "PAM", "PCM", "PPM"], f: "Pulse Position Modulation (PPM) conveys information through the timing or displacement of the pulses relative to their original positions." },
    { q: "Calculate the peak voltage of a 240 Vrms mains supply.", a: "339.4 V", options: ["240 V", "339.4 V", "480 V", "678.8 V"], f: "Peak voltage is Vrms × √2. Thus, 240 × 1.414 = 339.4 V." },
    { q: "State the advantage of a full-wave bridge rectifier over a half-wave rectifier.", a: "Higher ripple frequency and lower ripple voltage", options: ["Uses fewer diodes", "Higher ripple frequency and lower ripple voltage", "Does not require a transformer", "Provides a higher peak voltage"], f: "Full-wave rectifiers utilize both halves of the AC cycle, resulting in a ripple frequency twice that of the supply and a lower ripple voltage for the same capacitor." },
    { q: "Identify the function of the 'Load' signal in a PISO shift register.", a: "To enter parallel data into the flip-flops simultaneously", options: ["To clear the register to zero", "To output the data serially", "To enter parallel data into the flip-flops simultaneously", "To trigger the clock pulse"], f: "The load signal (often connected to 'Set' or 'Preset' inputs) places the multi-bit parallel word into the register all at once." },
    { q: "Calculate the number of states in the main sequence of a 3-bit binary up-counter.", a: "8", options: ["3", "6", "7", "8"], f: "A 3-bit counter has 2^3 = 8 possible states (000 to 111)." },
    { q: "Identify the effect of 'Modal Dispersion' in multi-mode optical fibres.", a: "Pulses spread out because light follows different paths", options: ["The core absorbs certain light frequencies", "Pulses spread out because light follows different paths", "Information leaks out of the cladding", "The refractive index changes with temperature"], f: "Modal dispersion occurs because different rays (modes) of light travel different path lengths, causing pulses to spread and overlap." },
    { q: "Identify the logic gate used to detect if two inputs are different.", a: "XOR", options: ["AND", "OR", "NAND", "XOR"], f: "The EX-OR gate output is logic 1 only when its inputs are different (0,1 or 1,0)." },
    { q: "State the purpose of a 'Pull-up resistor' in a logic circuit.", a: "To ensure a logic 1 state when a switch is open", options: ["To limit current through an LED", "To ensure a logic 1 state when a switch is open", "To protect against short circuits", "To increase the switching speed"], f: "A pull-up resistor ties an input pin to the positive rail, providing a defined logic 1 state until a switch pulls it to 0V." },
    { q: "Identify the term for a pulse width being proportional to the analogue signal amplitude.", a: "PWM", options: ["PWM", "PAM", "PPM", "PCM"], f: "In Pulse Width Modulation (PWM), the duration (width) of the pulse is varied according to the amplitude of the signal being modulated." },
    { q: "Identify the region where a photodiode is operated to act as a light sensor.", a: "Reverse bias", options: ["Forward bias", "Reverse bias", "Saturation", "Cut-off"], f: "In reverse bias, the leakage current of a photodiode is directly proportional to the intensity of the light falling on it." },
    { q: "Calculate the total power gain in dB for two cascaded amplifiers with gains of 10 dB and 20 dB.", a: "30 dB", options: ["2 dB", "15 dB", "30 dB", "200 dB"], f: "Gains in decibels are additive: 10 + 20 = 30 dB." },
    { q: "Identify the 'Disallowed State' for a NAND-based SR latch.", a: "S=0,R=0", options: ["S=0,R=0", "S=1,R=1", "S=0,R=1", "S=1,R=0"], f: "For an active-low NAND SR latch, providing logic 0 to both inputs forces both outputs to 1, which is considered a disallowed or invalid state." },
    { q: "State the condition for maximum power transfer to a load.", a: "Load resistance equals the source internal resistance", options: ["Load resistance is infinite", "Load resistance is zero", "Load resistance equals the source internal resistance", "Load resistance is ten times the source resistance"], f: "The Maximum Power Transfer Theorem states that power is maximized when the load resistance (RL) matches the source (Thevenin) resistance (RTh)." },
    { q: "Identify the instruction used in PIC Assembler to skip the next line if a bit is zero.", a: "btfsc", options: ["btfsc", "btfss", "decfsz", "movf"], f: "btfsc stands for 'Bit Test File, Skip if Clear' (logic 0)." },
    { q: "Identify the component used to protect a MOSFET from back-EMF when switching a motor.", a: "Diode in reverse bias across the motor", options: ["Zener diode in series", "Large capacitor across the supply", "Diode in reverse bias across the motor", "Resistor in series with the gate"], f: "A 'flyback' diode allows the current from the collapsing magnetic field to circulate safely, preventing high-voltage spikes." }
];

let quizSet = [];
let currentIndex = 0;
let userAnswers = [];
let score = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function startNewSession() {
    const pool = [...masterQuestionBank];
    shuffle(pool);
    quizSet = pool.slice(0, 20);
    currentIndex = 0;
    userAnswers = new Array(20).fill(null);
    score = 0;
    initUI();
}

function initUI() {
    document.getElementById('quiz-container').classList.remove('hidden');
    document.getElementById('summary-container').classList.add('hidden');
    renderSidebar();
    loadQuestion(0);
    updateProgress();
}

function renderSidebar() {
    const list = document.getElementById('question-list');
    list.innerHTML = '';
    quizSet.forEach((item, index) => {
        const btn = document.createElement('button');
        // Updated styling and "Question" label
        btn.className = `w-full text-left p-3 mb-2 rounded-xl text-[11px] transition-all flex items-center justify-between border ${index === currentIndex ? 'bg-blue-50 border-blue-200 text-blue-700 font-bold' : 'bg-transparent border-transparent text-slate-500 hover:bg-slate-50'}`;
        btn.onclick = () => loadQuestion(index);
        
        let status = '';
        if (userAnswers[index] !== null) {
            status = userAnswers[index].isCorrect 
                ? '<div class="w-2 h-2 rounded-full bg-green-500"></div>' 
                : '<div class="w-2 h-2 rounded-full bg-red-500"></div>';
        }
        
        btn.innerHTML = `<span>Question ${index + 1}</span> ${status}`;
        list.appendChild(btn);
    });
}

function loadQuestion(index) {
    currentIndex = index;
    const data = quizSet[index];
    
    document.getElementById('question-tag').textContent = `Logic Segment ${index + 1} / 20`;
    document.getElementById('question-text').textContent = data.q;
    document.getElementById('feedback-container').classList.add('hidden');
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    data.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-4 border-2 border-slate-100 rounded-2xl hover:border-blue-200 hover:bg-blue-50/50 transition-all font-medium text-slate-700 flex items-center gap-4 group";
        
        let icon = '<div class="w-5 h-5 rounded-full border-2 border-slate-200 flex-shrink-0 group-hover:border-blue-400"></div>';
        
        if (userAnswers[index] !== null) {
            btn.disabled = true;
            if (opt === data.a) {
                btn.className = "w-full text-left p-4 border-2 border-green-500 bg-green-50 rounded-2xl font-bold text-green-700 flex items-center gap-4";
                icon = '<div class="w-5 h-5 rounded-full bg-green-500 text-white flex items-center justify-center text-[10px]">✓</div>';
            } else if (opt === userAnswers[index].selected) {
                btn.className = "w-full text-left p-4 border-2 border-red-500 bg-red-50 rounded-2xl font-bold text-red-700 flex items-center gap-4";
                icon = '<div class="w-5 h-5 rounded-full bg-red-500 text-white flex items-center justify-center text-[10px]">✕</div>';
            } else {
                btn.className = "w-full text-left p-4 border-2 border-slate-50 bg-slate-50/50 opacity-40 rounded-2xl flex items-center gap-4";
            }
            showFeedback(userAnswers[index].isCorrect);
        } else {
            btn.onclick = () => handleAnswer(opt);
        }
        
        btn.innerHTML = `${icon} <span class="mono">${opt}</span>`;
        container.appendChild(btn);
    });
    
    renderSidebar();
}

function handleAnswer(selected) {
    const correct = quizSet[currentIndex].a;
    const isCorrect = selected === correct;
    userAnswers[currentIndex] = { selected, isCorrect };
    if (isCorrect) score++;
    
    updateProgress();
    loadQuestion(currentIndex);
}

function showFeedback(isCorrect) {
    const feedback = document.getElementById('feedback-container');
    const status = document.getElementById('feedback-status');
    const box = document.getElementById('feedback-box');
    const icon = document.getElementById('feedback-icon');
    const text = document.getElementById('feedback-text');
    
    feedback.classList.remove('hidden');
    
    if (isCorrect) {
        box.className = "p-5 rounded-2xl border-2 border-green-100 bg-green-50/50 flex gap-4 items-start";
        status.textContent = "Signal Accurate";
        status.className = "font-black text-[10px] uppercase tracking-widest mb-1 text-green-700";
        icon.innerHTML = '⚡';
    } else {
        box.className = "p-5 rounded-2xl border-2 border-red-100 bg-red-50/50 flex gap-4 items-start";
        status.textContent = "Logic Mismatch";
        status.className = "font-black text-[10px] uppercase tracking-widest mb-1 text-red-700";
        icon.innerHTML = '🔧';
    }
    
    text.textContent = quizSet[currentIndex].f;

    const nextBtn = document.getElementById('next-btn');
    if (currentIndex < 19) {
        nextBtn.textContent = "Advance Sequence";
        nextBtn.onclick = () => loadQuestion(currentIndex + 1);
    } else {
        nextBtn.textContent = "Compile Results";
        nextBtn.onclick = finish;
    }
}

function updateProgress() {
    const count = userAnswers.filter(a => a !== null).length;
    document.getElementById('progress-bar').style.width = (count / 20 * 100) + '%';
    document.getElementById('progress-text').textContent = count + '/20';
}

function finish() {
    document.getElementById('quiz-container').classList.add('hidden');
    document.getElementById('summary-container').classList.remove('hidden');
    document.getElementById('final-score').textContent = score + '/20';
    document.getElementById('final-percent').textContent = Math.round(score/20*100) + '%';
}

window.onload = startNewSession;
</script>

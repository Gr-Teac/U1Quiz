<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WJEC Physics Unit 3 Exam Prep</title>
<style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #f8f9fa;
            --dark: #2c3e50;
            --border: #dee2e6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--light);
            color: var(--dark);
        }

        /* Responsive Sidebar */
        #sidebar {
            width: 280px;
            background: var(--primary);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 5px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            transition: 0.2s;
        }

        .nav-btn.active { border: 2px solid var(--secondary); background: rgba(52, 152, 219, 0.3); }
        .nav-btn.correct { background: var(--success) !important; border-color: var(--success); }
        .nav-btn.incorrect { background: var(--danger) !important; border-color: var(--danger); }

        /* Main Area */
        #main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .quiz-container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .question-meta {
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 10px;
            display: block;
        }

        .question-text {
            font-size: 1.25rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: white;
            text-align: left;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not([disabled]) { border-color: var(--secondary); background-color: #f0f7ff; }
        .option-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .option-btn.incorrect { background: var(--danger); color: white; border-color: var(--danger); }

        .feedback-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            line-height: 1.6;
            border-left: 5px solid;
        }

        .summary-item {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 6px solid;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .action-area {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button.main-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            background: var(--secondary);
            color: white;
            transition: 0.2s;
        }

        button.main-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        #restart-btn { background: #95a5a6; margin-top: auto; }
        #summary-btn { background: var(--primary); border: 1px solid rgba(255,255,255,0.3); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; box-sizing: border-box; }
            #main-content { padding: 15px; }
            .nav-grid { grid-template-columns: repeat(10, 1fr); }
        }
    

/* auto-fit nav grid */
.nav-grid{grid-template-columns:repeat(auto-fit,minmax(45px,1fr));}
@media(max-width:1024px){.nav-grid{grid-template-columns:repeat(auto-fit,minmax(35px,1fr));}}


/* --- Mobile Hamburger Menu Restore --- */
#sidebarToggle { display:none; position:sticky; top:0; width:100%; padding:12px; background:var(--primary); color:white; border:none; font-weight:700; cursor:pointer; z-index:60; }
#sidebarToggle .bars { width:22px; height:2px; background:#fff; box-shadow:0 6px 0 #fff, 0 -6px 0 #fff; display:inline-block; margin-right:10px; }
#overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:50; }
@media(max-width:1024px){
 body { flex-direction:column; }
 #sidebar { position:fixed; left:0; top:0; height:100dvh; width:min(85vw,300px); transform:translateX(-100%); transition:transform .25s ease; z-index:70; }
 #sidebar.open { transform:translateX(0); }
 #sidebarToggle { display:flex; align-items:center; }
}
</style>
</head>
<body><button aria-expanded="false" id="sidebarToggle"><span class="bars"></span> Menu</button>
<div id="sidebar">
<button id="sidebarClose" style="background:none;border:none;color:white;font-size:1.8rem;cursor:pointer;align-self:flex-end;margin-bottom:10px;">✕</button><h2 style="margin: 0 0 20px 0; font-size: 1.2rem;">Unit 3 Navigation</h2>
<div class="nav-grid" id="nav-grid"></div>
<button class="main-btn" id="summary-btn" style="margin-bottom:10px">Show Summary</button>
<button class="main-btn" id="restart-btn">Restart Quiz</button>
</div>
<div id="main-content">
<div class="quiz-container" id="quiz-view">
<span class="question-meta" id="q-num">Question 1 of 20</span>
<div class="question-text" id="q-text"></div>
<div class="options-list" id="options-container"></div>
<div class="feedback-box" id="feedback"></div>
<div class="action-area">
<button class="main-btn" id="prev-btn">Previous</button>
<button class="main-btn" id="next-btn">Next</button>
</div>
</div>
<div class="quiz-container" id="summary-view" style="display:none;">
<h2 style="margin-top:0">Review Performance</h2>
<div id="summary-list"></div>
<button class="main-btn" id="back-to-quiz">Return to Questions</button>
</div>
</div>
<script>
    const questionBank = [
          { q: "State the function of the live wire in a domestic ring main circuit.", options: ["To complete the circuit and carry current away at low voltage.", "To carry current to the appliance at a high voltage.", "To provide a low-resistance path to the ground for safety.", "To measure the total energy consumed by the appliance."], correct: 1, why: "The live wire carries current to the house or appliance at high voltage, usually 230 V." },
  { q: "Calculate the total resistance of two 10 Ω resistors connected in parallel.", options: ["20 Ω", "10 Ω", "5 Ω", "2 Ω"], correct: 2, why: "Using the equation 1/R = 1/R1 + 1/R2, the calculation is 1/10 + 1/10 = 2/10, so R = 10/2 = 5 Ω." },
  { q: "State the orbital period of a geostationary satellite.", options: ["12 hours", "24 hours", "90 minutes", "1 month"], correct: 1, why: "Geostationary satellites have an orbit time of 24 hours to match the Earth's rotation, remaining fixed over one point." },
  { q: "Describe the nature of a transverse wave.", options: ["Vibrations are parallel to the direction of energy transfer.", "Vibrations are at right angles to the direction of wave travel.", "The wave requires a medium to travel through.", "The frequency of the wave increases as it enters shallow water."], correct: 1, why: "Transverse waves have oscillations perpendicular (at right angles) to the direction of energy transfer." },
  { q: "Calculate the power of an appliance if the voltage is 230 V and the current is 12 A.", options: ["2760 W", "19.2 W", "242 W", "0.05 W"], correct: 0, why: "Using the equation P = VI, the power is 230 V × 12 A = 2760 W." },
  { q: "Determine which region of the electromagnetic spectrum has the longest wavelength.", options: ["X-rays", "Visible light", "Microwaves", "Radio waves"], correct: 3, why: "Radio waves have the longest wavelengths in the EM spectrum, reaching hundreds of metres." },
  { q: "State the standard unit used for density in laboratory experiments for small irregular solids.", options: ["kg/m³", "g/cm³", "kg/cm³", "g/m³"], correct: 1, why: "In school laboratories, the density of small objects like pebbles is typically measured in g/cm³." },
  { q: "Explain the purpose of a step-up transformer in the National Grid.", options: ["To increase current and reduce voltage for safety.", "To decrease voltage and increase current for efficiency.", "To increase voltage and decrease current to reduce energy loss as heat.", "To convert alternating current into direct current."], correct: 2, why: "Step-up transformers increase voltage to allow for a lower current, which reduces energy lost as heat in the transmission cables." },
  { q: "Calculate the energy transferred by a 2.4 kW kettle used for 0.5 hours.", options: ["4.8 kWh", "1.2 kWh", "1.2 J", "7.2 MJ"], correct: 1, why: "Using the equation E = Pt, the calculation is 2.4 kW × 0.5 h = 1.2 kWh." },
  { q: "State what happens to the resistance of a thermistor as the temperature increases.", options: ["It increases.", "It decreases.", "It remains constant.", "It doubles every 10 degrees."], correct: 1, why: "For an NTC thermistor, the resistance decreases as the temperature rises." },
  { q: "Calculate the percentage efficiency of a power station that receives 500 units of energy and wastes 315 units.", options: ["63%", "37%", "185%", "31.5%"], correct: 1, why: "Useful energy = 500 - 315 = 185. Efficiency = (185/500) × 100 = 37%." },
  { q: "State which method of heat transfer involves the movement of particles in fluids due to density changes.", options: ["Conduction", "Convection", "Radiation", "Evaporation"], correct: 1, why: "Convection occurs in liquids and gases when heated, less dense fluid rises and cooler, denser fluid sinks." },
  { q: "Calculate the frequency of a microwave with a speed of 3 x 10^8 m/s and a wavelength of 0.06 m.", options: ["5 x 10^9 Hz", "1.8 x 10^7 Hz", "2 x 10^-10 Hz", "5 x 10^7 Hz"], correct: 0, why: "Using the equation f = v/λ, the frequency is 3 x 10^8 / 0.06 = 5 x 10^9 Hz." },
  { q: "Describe the function of an earth wire in a domestic appliance with a metal case.", options: ["To carry the main operating current.", "To prevent the appliance from overheating.", "To carry current safely to the ground if the metal case becomes live.", "To ensure the appliance uses less energy."], correct: 2, why: "The earth wire provides a low-resistance path to the ground for safety if a fault makes the metal case live." },
  { q: "State the relationship between wave speed and depth for shallow water waves.", options: ["Speed is proportional to the depth.", "Speed decreases as depth increases.", "Speed is proportional to the square root of the depth.", "Speed is independent of the depth."], correct: 2, why: "The wave speed in shallow water is governed by the equation v = 3.13 × √d." },
  { q: "Calculate the units used (kWh) by a 3000 W appliance used for 20 minutes.", options: ["60 kWh", "1 kWh", "1000 kWh", "60,000 kWh"], correct: 1, why: "3000 W = 3 kW and 20 mins = 1/3 hour. Therefore, 3 kW × 1/3 h = 1 kWh." },
  { q: "Determine which surface is the best absorber of infra-red radiation.", options: ["Shiny silver foil", "White paper", "Dull black paper", "Clear glass"], correct: 2, why: "Dull, black surfaces are the most effective absorbers of heat and infra-red radiation." },
  { q: "State the function of a diode in a circuit.", options: ["To increase the voltage of the supply.", "To only allow current to flow in one direction.", "To measure the resistance of other components.", "To protect the circuit from high currents."], correct: 1, why: "A diode has high resistance in one direction and low resistance in the other, allowing current to flow only one way." },
  { q: "Calculate the payback time for a biomass generator that costs £152,400 and saves £2,400 per month.", options: ["6.35 months", "63.5 months", "52 months", "10 years"], correct: 1, why: "Payback time is the total cost divided by monthly savings: £152,400 / £2,400 = 63.5 months." },
  { q: "State the property that all electromagnetic waves have in common in a vacuum.", options: ["They all have the same frequency.", "They all travel at the same speed.", "They all have the same wavelength.", "They are all longitudinal waves."], correct: 1, why: "All regions of the EM spectrum travel at the speed of light (3 x 10^8 m/s) in a vacuum." },
  { q: "State the function of a miniature circuit breaker (mcb).", options: ["To protect the user from electric shocks.", "To complete the circuit when an appliance is switched on.", "To trip and break the circuit if the current becomes too large.", "To change a.c. to d.c."], correct: 2, why: "An mcb is a safety switch that trips if the current exceeds a certain value, protecting the circuit from damage." },
  { q: "Calculate the density of a 25 kg block with a volume of 0.022 m³.", options: ["0.55 kg/m³", "1136 kg/m³", "1.136 kg/m³", "550 kg/m³"], correct: 1, why: "Density is mass divided by volume: 25 kg / 0.022 m³ = 1136.36 kg/m³." },
  { q: "State which regions of the electromagnetic spectrum are classified as ionizing radiation.", options: ["Radio waves, Microwaves, and Infra-red", "Visible light and Ultraviolet", "Ultraviolet, X-rays, and Gamma rays", "Only Gamma rays"], correct: 2, why: "Ultraviolet, X-rays, and Gamma rays have enough energy to remove electrons from atoms, making them ionizing." },
  { q: "Explain the difference between a.c. and d.c.", options: ["a.c. is constant while d.c. changes direction.", "a.c. continuously changes direction while d.c. flows in one direction.", "a.c. is safer than d.c.", "a.c. is only used in batteries."], correct: 1, why: "Alternating current (a.c.) changes direction periodically, while direct current (d.c.) flows consistently in one direction." },
  { q: "Calculate the resistance of a kettle heater that uses 12 A of current from a 230 V supply.", options: ["2760 Ω", "19.17 Ω", "0.05 Ω", "12 Ω"], correct: 1, why: "Using the equation R = V/I, the resistance is 230 V / 12 A = 19.17 Ω." },
  { q: "Describe the function of a step-down transformer.", options: ["To increase voltage for long-distance transmission.", "To reduce voltage to a safer level for consumers.", "To increase the frequency of the mains supply.", "To act as a fuse for the National Grid."], correct: 1, why: "Step-down transformers lower the high transmission voltage to 230 V for safe use in homes." },
  { q: "State what happens to the resistance of a Light Dependent Resistor (LDR) as light intensity increases.", options: ["It increases.", "It decreases.", "It remains constant.", "It fluctuates."], correct: 1, why: "The resistance of an LDR falls as more light shines on it." },
  { q: "Calculate the total resistance of a 12 Ω and 6 Ω resistor connected in series.", options: ["18 Ω", "4 Ω", "6 Ω", "72 Ω"], correct: 0, why: "In a series circuit, total resistance is the sum of individual resistances: 12 + 6 = 18 Ω." },
  { q: "State which metal is generally the best conductor of heat according to laboratory experiments.", options: ["Iron", "Brass", "Aluminium", "Copper"], correct: 3, why: "Copper is identified as the most efficient thermal conductor among common laboratory metals." },
  { q: "State the frequency of the UK mains electricity supply.", options: ["230 Hz", "50 Hz", "60 Hz", "100 Hz"], correct: 1, why: "The UK National Grid operates at a standard frequency of 50 Hz." },
  { q: "Calculate the current in a 400 kV transmission line if the power is 1200 MW.", options: ["3 A", "3000 A", "480,000 A", "0.33 A"], correct: 1, why: "Using I = P/V, the current is 1,200,000,000 W / 400,000 V = 3000 A." },
  { q: "State the main disadvantage of relying on wind turbines for electricity generation.", options: ["They produce too much CO2.", "They are unreliable as it is not always windy.", "They are too expensive to build.", "They have a very long start-up time."], correct: 1, why: "Wind turbines are weather-dependent and cannot provide a constant, reliable base load of electricity." },
  { q: "Describe how heat energy is conducted through a metal rod.", options: ["Particles move from the hot end to the cold end.", "Particles vibrate and collide with neighbours, and free electrons move through the structure.", "Density changes cause the metal to rise.", "Heat travels as electromagnetic waves through the atoms."], correct: 1, why: "Conduction in metals involves the vibration of ions and the rapid transfer of energy by mobile free electrons." },
  { q: "Calculate the cost of using a 2.4 kW kettle for 0.1 hours if 1 unit costs 34p.", options: ["81.6p", "8.16p", "24p", "3.4p"], correct: 1, why: "Units used = 2.4 kW × 0.1 h = 0.24 kWh. Cost = 0.24 × 34p = 8.16p." },
  { q: "State the orbital period of a geosynchronous satellite.", options: ["24 hours", "12 hours", "1 hour", "90 minutes"], correct: 0, why: "A geosynchronous satellite has an orbital period that matches the Earth's sidereal rotation period of 24 hours." },
  { q: "Determine the constant property of a wave as it moves from deep to shallow water.", options: ["Wave speed", "Wavelength", "Frequency", "Amplitude"], correct: 2, why: "While speed and wavelength decrease in shallow water, the frequency remains the same as the source." },
  { q: "State the function of a residual current circuit breaker (rccb).", options: ["To protect the circuit from overheating.", "To break the circuit when there is a current imbalance between live and neutral wires.", "To increase the efficiency of appliances.", "To measure the voltage across a component."], correct: 1, why: "An rccb protects the user by detecting small current leakages to the earth through an imbalance between live and neutral." },
  { q: "Calculate the mean power of a washing machine that uses 0.54 kWh in a 4-hour cycle.", options: ["2.16 kW", "0.135 kW", "0.54 kW", "7.4 kW"], correct: 1, why: "Power is energy divided by time: 0.54 kWh / 4 h = 0.135 kW." },
  { q: "State which type of power station has a very short start-up time and can respond quickly to demand.", options: ["Nuclear", "Coal", "Pumped storage hydroelectric", "Natural gas"], correct: 2, why: "Pumped storage systems can start generating electricity almost immediately to handle sudden peaks in demand." },
  { q: "Describe the function of the neutral wire.", options: ["To carry current at high voltage.", "To complete the circuit and carry current at low/zero voltage.", "To provide safety against electric shocks.", "To protect the appliance from power surges."], correct: 1, why: "The neutral wire completes the circuit and returns the current to the supply at zero potential." },
  { q: "Calculate the efficiency of a power station if it has an input power of 20.0 MW and a total useful output of 16.4 MW.", options: ["15%", "63%", "82%", "12.2%"], correct: 2, why: "Efficiency is calculated as (useful output / total input) × 100. Therefore, (16.4 / 20.0) × 100 = 82%." },
  { q: "State the name of a longitudinal wave.", options: ["Light wave", "Water wave", "Sound wave", "Radio wave"], correct: 2, why: "Sound is a longitudinal wave where the vibrations are parallel to the direction of wave travel." },
  { q: "Calculate the distance a signal travels to a geostationary satellite and back if the height is 36,000 km.", options: ["36,000 km", "72,000 km", "18,000 km", "144,000 km"], correct: 1, why: "The signal travels to the satellite and back, so the total distance is 2 × 36,000 km = 72,000 km." },
  { q: "State why trapped air is used in loft insulation.", options: ["Air is a good conductor of heat.", "Trapped air reduces heat loss by conduction and convection.", "Air increases the density of the insulation.", "It makes the insulation easier to install."], correct: 1, why: "Air is a poor conductor, and trapping it prevents convection currents from moving heat." },
  { q: "Calculate the volume of a 25,000 kg load if the density is 500 kg/m³.", options: ["12,500,000 m³", "50 m³", "0.02 m³", "5 m³"], correct: 1, why: "Volume is mass divided by density: 25,000 kg / 500 kg/m³ = 50 m³." },
  { q: "State the main benefit of using a ring main circuit.", options: ["It uses more electricity.", "Cables can be thinner because there are two paths for the current.", "It is a series circuit so it is simpler to wire.", "It only requires one fuse for the whole house."], correct: 1, why: "The loop design allows current to split, meaning smaller, thinner wires can be used safely." },
  { q: "State which region of the EM spectrum is used for transmitting information via geostationary satellites.", options: ["X-rays", "Radio waves", "Microwaves", "Ultraviolet"], correct: 2, why: "Microwaves are used because they can pass through the atmosphere without being reflected or absorbed." },
  { q: "Calculate the time taken for a light signal to travel 1.44 x 10^8 m.", options: ["0.48 s", "4.8 s", "0.24 s", "0.12 s"], correct: 0, why: "Time is distance divided by speed: 1.44 x 10^8 / 3 x 10^8 = 0.48 s." },
  { q: "State the advantage of using a variable resistor in a circuit investigation.", options: ["To keep the voltage constant.", "To vary the current and voltage to obtain multiple readings.", "To act as a safety fuse.", "To measure the resistance directly."], correct: 1, why: "Adjusting a variable resistor allows students to map out the I-V characteristics of a component." },
  { q: "State the approximate voltage of the UK mains supply.", options: ["12 V", "230 V", "400,000 V", "50 V"], correct: 1, why: "The nominal voltage for the domestic mains electricity supply in the UK is 230 V." }

    ];

    let currentQuestions = [];
    let userAnswers = new Array(20).fill(null);
    let currentIdx = 0;

    function init() {
        const shuffled = [...questionBank].sort(() => 0.5 - Math.random());
        currentQuestions = shuffled.slice(0, 20);
        userAnswers = new Array(20).fill(null);
        currentIdx = 0;
        
        renderNav();
        updateUI();
        toggleView('quiz');
    }

    function renderNav() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = '';
        currentQuestions.forEach((_, i) => {
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = i + 1;
            btn.id = `nav-${i}`;
            btn.onclick = () => jumpTo(i);
            grid.appendChild(btn);
        });
    }

    function updateUI() {
        const q = currentQuestions[currentIdx];
        document.getElementById('q-num').innerText = `Question ${currentIdx + 1} of 20`;
        document.getElementById('q-text').innerHTML = q.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const feedback = document.getElementById('feedback');
        feedback.style.display = 'none';

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            
            if (userAnswers[currentIdx] !== null) {
                btn.disabled = true;
                if (i === q.correct) btn.classList.add('correct');
                if (i === userAnswers[currentIdx] && i !== q.correct) btn.classList.add('incorrect');
                
                feedback.style.display = 'block';
                feedback.style.backgroundColor = userAnswers[currentIdx] === q.correct ? '#d4edda' : '#f8d7da';
                feedback.style.borderColor = userAnswers[currentIdx] === q.correct ? '#c3e6cb' : '#f5c6cb';
                feedback.innerHTML = `<strong>Feedback:</strong> ${q.why}`;
            } else {
                btn.onclick = () => select(i);
            }
            container.appendChild(btn);
        });

        // Update nav visual
        document.querySelectorAll('.nav-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i === currentIdx);
            if (userAnswers[i] !== null) {
                btn.classList.add(userAnswers[i] === currentQuestions[i].correct ? 'correct' : 'incorrect');
            }
        });

        document.getElementById('prev-btn').disabled = currentIdx === 0;
        document.getElementById('next-btn').disabled = currentIdx === 19;
    }

    function select(idx) {
        userAnswers[currentIdx] = idx;
        updateUI();
    }

    function jumpTo(idx) {
        currentIdx = idx;
        updateUI();
    }

    function toggleView(view) {
        document.getElementById('quiz-view').style.display = view === 'quiz' ? 'block' : 'none';
        document.getElementById('summary-view').style.display = view === 'summary' ? 'block' : 'none';
        if (view === 'summary') renderSummary();
    }

    function renderSummary() {
        const list = document.getElementById('summary-list');
        list.innerHTML = '';
        let score = 0;
        let count = 0;

        currentQuestions.forEach((q, i) => {
            if (userAnswers[i] !== null) {
                count++;
                const correct = userAnswers[i] === q.correct;
                if (correct) score++;
                
                const item = document.createElement('div');
                item.className = 'summary-item';
                item.style.borderColor = correct ? 'var(--success)' : 'var(--danger)';
                item.innerHTML = `
                    <strong>Question ${i+1}:</strong> ${q.q}<br>
                    <span style="color:${correct ? 'green' : 'red'}">Your choice: ${q.options[userAnswers[i]]}</span><br>
                    <small>Correct: ${q.options[q.correct]}</small>
                    <p style="margin-top:10px; font-style:italic; font-size:0.9em;">${q.why}</p>
                `;
                list.appendChild(item);
            }
        });
        
        const header = document.createElement('h3');
        header.innerText = `Session Score: ${score} / ${count} answered.`;
        list.prepend(header);
    }

    document.getElementById('prev-btn').onclick = () => { if(currentIdx > 0) jumpTo(currentIdx - 1); };
    document.getElementById('next-btn').onclick = () => { if(currentIdx < 19) jumpTo(currentIdx + 1); };
    document.getElementById('restart-btn').onclick = init;
    document.getElementById('summary-btn').onclick = () => toggleView('summary');
    document.getElementById('back-to-quiz').onclick = () => toggleView('quiz');

    init();


// --- Hamburger Menu Logic ---
(function(){
 const sidebar = document.getElementById('sidebar');
 const toggle = document.getElementById('sidebarToggle');
 const overlay = document.getElementById('overlay');

 function open(){ sidebar.classList.add('open'); overlay.style.display='block'; toggle.setAttribute('aria-expanded','true'); }
 function close(){ sidebar.classList.remove('open'); overlay.style.display='none'; toggle.setAttribute('aria-expanded','false'); }

 toggle?.addEventListener('click', ()=> sidebar.classList.contains('open') ? close() : open());

 document.addEventListener('keydown', e => { if(e.key==='Escape') close(); });

// Close button inside sidebar
(function(){
 const closeBtn=document.getElementById('sidebarClose');
 const sidebar=document.getElementById('sidebar');
 const overlay=document.getElementById('overlay');
 const toggle=document.getElementById('sidebarToggle');
 function close(){sidebar.classList.remove('open');overlay.style.display='none';toggle.setAttribute('aria-expanded','false');}
 closeBtn?.addEventListener('click',close);
})();
</script>
